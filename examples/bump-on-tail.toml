# ---------------------------------------------------
# bump-on-tail.toml
# ---------------------------------------------------
# For the following plasma:
#     nbeam/n0 = 0.03
#     vbeam = 0.25*c
#     sqrt(Te/me) = 0.05 for both bulk and beam populations
# Fastest-growing mode predicted by non-relativistic electrostatic dispersion
# has parameters:
#     Re(omega) = 1.0*omega_pe
#     Im(omega) = 0.075*omega_pe
#     k = 4.9*omega_pe/c
# where omega_pe is the electron plasma frequency, k = 2*pi/wavelength is the
# wavenumber, c is speed of light, vbeam is (non-relativistic) three-velocity,
# nbeam is beam density, n0 = background (bulk) density.
# ---------------------------------------------------

[domain_parameters]
length = 1
timestep_over_spatialstep_times_c = 3.0
number_grid_points = 70
number_grid_points_y = 3
number_grid_points_z = 3
total_steps = 500
# particle_BC_left = 0  # 0: periodic, 1: reflective, 2: absorbing
# particle_BC_right = 0
# field_BC_left = 0     # 0: periodic, 1: reflecting, 2: absorbing
# field_BC_right = 0

[solver_parameters]
time_evolution_algorithm = 0  # 0: Boris solver, 1: implicit Crank-Nicholson
max_number_of_Picard_iterations_implicit_CN = 20
number_of_particle_substeps_implicit_CN = 2
tolerance_Picard_iterations_implicit_CN = 1e-10
field_solver = 0
print_info = true
relativistic = false
seed = 250724
filter_passes = 0
filter_alpha = 0.5
filter_strides = [1, 2, 4]

[species_parameters.electrons.electrons0]
number_pseudoparticles = 12000
grid_points_per_Debye_length = 2.565
weight = 0
charge_over_elementary_charge = -1
random_positions_x = true
random_positions_y = false
random_positions_z = false
perturbation_amplitude_x = 0
perturbation_amplitude_y = 0
perturbation_amplitude_z = 0
perturbation_wavenumber_x = 0
perturbation_wavenumber_y = 0
perturbation_wavenumber_z = 0
vth_over_c_x = 0.07071067812
vth_over_c_y = 0
vth_over_c_z = 0
drift_speed_x = -2.25e6
drift_speed_y = 0
drift_speed_z = 0
velocity_plus_minus_x = false
velocity_plus_minus_y = false
velocity_plus_minus_z = false

[species_parameters.ions.ions0]
number_pseudoparticles = 12000
grid_points_per_Debye_length = 2.565
weight = 0
charge_over_elementary_charge = 1
mass_over_proton_mass = 1
random_positions_x = true
random_positions_y = false
random_positions_z = false
perturbation_amplitude_x = 0
perturbation_amplitude_y = 0
perturbation_amplitude_z = 0
perturbation_wavenumber_x = 0
perturbation_wavenumber_y = 0
perturbation_wavenumber_z = 0
vth_over_c_x = "_electrons0"
vth_over_c_y = "_electrons0"
vth_over_c_z = "_electrons0"
ion_temperature_over_electron_temperature_x = 1.0
ion_temperature_over_electron_temperature_y = 1.0
ion_temperature_over_electron_temperature_z = 1.0
drift_speed_x = 0
drift_speed_y = 0
drift_speed_z = 0
velocity_plus_minus_x = false
velocity_plus_minus_y = false
velocity_plus_minus_z = false

# Old generic species weight_ratio = 3e-2.
# The new species model sets density through computed weight. Since
# weight is proportional to grid_points_per_Debye_length**2 for equal
# particle counts, grid_points_per_Debye_length is scaled by sqrt(3e-2)
# to preserve the previous beam/bulk weight ratio.
[species_parameters.electrons.beam]
number_pseudoparticles = 12000
grid_points_per_Debye_length = 0.44427103214
weight = 0
charge_over_elementary_charge = -1
random_positions_x = true
random_positions_y = false
random_positions_z = false
perturbation_amplitude_x = 0
perturbation_amplitude_y = 0
perturbation_amplitude_z = 0
perturbation_wavenumber_x = 0
perturbation_wavenumber_y = 0
perturbation_wavenumber_z = 0
vth_over_c_x = 0.07071067812
vth_over_c_y = 0
vth_over_c_z = 0
drift_speed_x = 7.5e7
drift_speed_y = 0
drift_speed_z = 0
seed_position_override = true
seed_position = 10

# Old generic species weight_ratio = 3e-2.
[species_parameters.ions.beam_neutralizer]
number_pseudoparticles = 12000
grid_points_per_Debye_length = 0.44427103214
weight = 0
charge_over_elementary_charge = 1
mass_over_proton_mass = 1
random_positions_x = true
random_positions_y = false
random_positions_z = false
perturbation_amplitude_x = 0
perturbation_amplitude_y = 0
perturbation_amplitude_z = 0
perturbation_wavenumber_x = 0
perturbation_wavenumber_y = 0
perturbation_wavenumber_z = 0
vth_over_c_x = 0.0016
vth_over_c_y = 0
vth_over_c_z = 0
drift_speed_x = 0
drift_speed_y = 0
drift_speed_z = 0
seed_position_override = true
seed_position = 10
